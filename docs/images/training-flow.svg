<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="训练流程图">
  <rect width="1200" height="520" fill="#f8fafc"/>
  <text x="60" y="68" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">训练流程（开始训练 -> 结束训练）</text>

  <rect x="60" y="130" width="180" height="90" rx="12" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <text x="88" y="183" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">选择左/右手</text>

  <rect x="300" y="130" width="180" height="90" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="338" y="183" font-family="Arial, sans-serif" font-size="24" fill="#14532d">开始训练</text>

  <rect x="540" y="130" width="220" height="90" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="566" y="183" font-family="Arial, sans-serif" font-size="24" fill="#1e3a8a">实时识别与语音引导</text>

  <rect x="820" y="130" width="180" height="90" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="858" y="183" font-family="Arial, sans-serif" font-size="24" fill="#991b1b">结束训练</text>

  <rect x="60" y="300" width="260" height="90" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="90" y="353" font-family="Arial, sans-serif" font-size="24" fill="#78350f">上传 metrics + keyframes</text>

  <rect x="380" y="300" width="220" height="90" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="353" font-family="Arial, sans-serif" font-size="24" fill="#4c1d95">后端分析评分</text>

  <rect x="660" y="300" width="220" height="90" rx="12" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <text x="692" y="353" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">日报/趋势/提醒</text>

  <rect x="940" y="300" width="200" height="90" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="968" y="353" font-family="Arial, sans-serif" font-size="24" fill="#155e75">关键帧回看导出</text>

  <path d="M240 175 L300 175" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M480 175 L540 175" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 175 L820 175" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M910 220 L910 260 L190 260 L190 300" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M320 345 L380 345" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M600 345 L660 345" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M880 345 L940 345" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
