<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-label="系统架构图">
  <rect width="1200" height="680" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">智慧养老康复平台 - 系统架构</text>

  <rect x="60" y="130" width="320" height="170" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="90" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#14532d">患者网页端</text>
  <text x="90" y="215" font-family="Arial, sans-serif" font-size="22" fill="#14532d">React + Vite + TypeScript</text>
  <text x="90" y="250" font-family="Arial, sans-serif" font-size="22" fill="#14532d">摄像头采集 + 训练交互</text>

  <rect x="440" y="130" width="320" height="170" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a8a">后端 API</text>
  <text x="480" y="215" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">FastAPI + 规则分析引擎</text>
  <text x="480" y="250" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">日报、趋势、提醒接口</text>

  <rect x="820" y="130" width="320" height="170" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="860" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#78350f">数据存储</text>
  <text x="860" y="215" font-family="Arial, sans-serif" font-size="22" fill="#78350f">SQLite Sessions/Daily Reports</text>
  <text x="860" y="250" font-family="Arial, sans-serif" font-size="22" fill="#78350f">关键帧与训练指标</text>

  <rect x="60" y="380" width="1080" height="230" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="90" y="430" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#0f172a">核心业务闭环</text>
  <text x="90" y="475" font-family="Arial, sans-serif" font-size="22" fill="#334155">1. 摄像头识别握紧-放松动作，实时生成握力、稳定度、疲劳指标</text>
  <text x="90" y="510" font-family="Arial, sans-serif" font-size="22" fill="#334155">2. 结束训练后上传 metrics + keyframes，后端计算日分析与手别对比</text>
  <text x="90" y="545" font-family="Arial, sans-serif" font-size="22" fill="#334155">3. 前端展示左右手日报、趋势图、日历明细与异常提醒</text>
  <text x="90" y="580" font-family="Arial, sans-serif" font-size="22" fill="#334155">4. 支持关键帧回看与训练摘要导出，便于康复师复评</text>

  <path d="M380 215 L440 215" stroke="#16a34a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M760 215 L820 215" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
